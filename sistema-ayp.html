<style>
:root{
  --bg:#f8f8f8; --surface:#ffffff; --surface-2:#f3f3f5;
  --sidebar:#1a1a1a; --sidebar-hover:#262626; --sidebar-active:#6366f1;
  --text:#18181b; --text-soft:#52525b; --text-mut:#a1a1aa;
  --border:#e7e7ea; --accent:#6366f1; --accent-soft:#eef2ff;
  --green:#16a34a; --green-soft:#dcfce7;
  --amber:#d97706; --amber-soft:#fef3c7;
  --red:#dc2626; --red-soft:#fee2e2;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.12);
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}

.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--sidebar);color:#e5e5e5;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;padding:20px 14px;z-index:40;}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.brand .logo i{width:19px;height:19px}
.brand h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.brand span{font-size:11px;color:#8a8a8a;display:block;font-weight:500}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#6b6b6b;font-weight:600;padding:14px 10px 8px}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:#b5b5b5;padding:9px 10px;border-radius:9px;font-size:13.5px;font-weight:500;transition:.13s;margin-bottom:2px;}
.nav-item i{width:18px;height:18px;flex-shrink:0;pointer-events:none}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;font-weight:600}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid #2c2c2c}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;margin-left:auto;flex-shrink:0;box-shadow:0 0 6px #22c55e80}
.sync-dot.offline{background:#f59e0b;box-shadow:0 0 6px #f59e0b80}
.sync-dot.error{background:#ef4444;box-shadow:0 0 6px #ef444480}

.main{flex:1;margin-left:248px;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 32px 18px;gap:16px;}
.topbar h2{font-size:22px;font-weight:700;letter-spacing:-.4px}
.topbar p{font-size:13px;color:var(--text-soft);margin-top:2px}
.content{padding:4px 32px 48px;flex:1}

/* Loading overlay */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
.loading-screen .logo-big{width:52px;height:52px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;}
.loading-screen .logo-big i{width:28px;height:28px}
.loading-screen p{font-size:14px;color:var(--text-soft);font-weight:500}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen.hidden{display:none}

/* Error banner */
.error-banner{background:var(--red-soft);border:1px solid #fca5a5;border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:13px;color:#991b1b;display:none;align-items:center;gap:10px;}
.error-banner.show{display:flex}
.error-banner i{width:16px;height:16px;flex-shrink:0}

.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;border-radius:var(--radius-sm);padding:9px 15px;font-size:13.5px;font-weight:600;transition:.13s;white-space:nowrap;}
.btn i{width:16px;height:16px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5457e0}
.btn-ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c11d1d}
.btn-icon{padding:7px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--text-soft)}
.btn-icon:hover{background:var(--surface-2);color:var(--text)}
.btn-icon i{width:15px;height:15px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:20px 22px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border)}
.card-head h3{font-size:15px;font-weight:700}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.kpi .lbl{font-size:12px;color:var(--text-soft);font-weight:500;display:flex;align-items:center;gap:6px}
.kpi .lbl i{width:14px;height:14px;color:var(--text-mut)}
.kpi .val{font-size:25px;font-weight:700;letter-spacing:-.6px;margin-top:8px}
.kpi .sub{font-size:12px;color:var(--text-mut);margin-top:3px;font-weight:500}
.kpi .val.green{color:var(--green)}
.kpi .val.red{color:var(--red)}
.kpi .val.amber{color:var(--amber)}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-mut);font-weight:600;padding:11px 16px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{transition:.1s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.muted{color:var(--text-mut)}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge.green{background:var(--green-soft);color:var(--green)}
.badge.amber{background:var(--amber-soft);color:var(--amber)}
.badge.red{background:var(--red-soft);color:var(--red)}

.badge.indigo{background:var(--accent-soft);color:var(--accent)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-soft);margin-bottom:6px}
.input,select.input,textarea.input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);transition:.13s;}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea.input{resize:vertical;min-height:64px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.seg{display:inline-flex;background:var(--surface-2);border-radius:9px;padding:3px;gap:2px}
.seg button{border:none;background:none;padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--text-soft);transition:.12s}
.seg button.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{border:none;background:none;padding:10px 4px;margin-right:18px;font-size:14px;font-weight:600;color:var(--text-mut);border-bottom:2px solid transparent;transition:.12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}

.lineas-tbl input,.lineas-tbl select{padding:7px 9px}
.lineas-tbl td{padding:7px 8px}
.line-sub{font-weight:600;font-variant-numeric:tabular-nums}

.overlay{position:fixed;inset:0;background:rgba(15,15,18,.45);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:80;padding:20px;}
.overlay.show{display:flex;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:pop .18s ease}
@keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);gap:12px}
.modal-head h3{font-size:16px;font-weight:700;flex:1}
.modal-body{padding:20px 22px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}

.toast i{width:16px;height:16px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.abonos-row{background:var(--surface-2)}
.abonos-row td{padding:0}
.abonos-inner{padding:10px 22px 14px 46px}
.abono-line{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed var(--border);color:var(--text-soft)}
.abono-line:last-child{border-bottom:none}
.expand-btn{background:none;border:none;color:var(--text-mut);padding:2px;cursor:pointer;display:inline-flex}
.expand-btn i{width:15px;height:15px;transition:.15s}
.expand-btn.open i{transform:rotate(90deg)}
.chip-add{font-size:12px;color:var(--accent);font-weight:600;background:none;border:none;padding:0;cursor:pointer;margin-left:8px}
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.cat-pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px}
.cat-vapes{background:#ede9fe;color:#7c3aed}
.cat-mieles{background:#fef3c7;color:#b45309}
.section-gap{margin-top:18px}
.hint{font-size:12px;color:var(--text-mut);margin-top:5px}
.rank-item{margin-bottom:14px}
.rank-item:last-child{margin-bottom:0}
.rank-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.rank-header .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.rank-header .val{color:var(--text-soft)}
.rank-bar-track{height:7px;background:var(--surface-2);border-radius:5px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:5px;transition:width .4s ease}
.rank-bar-fill.indigo{background:var(--accent)}
.rank-bar-fill.green{background:var(--green)}
.rank-bar-fill.amber{background:var(--amber)}

@media(max-width:880px){
  .sidebar{width:64px;padding:18px 10px}
  .brand h1,.brand span,.nav-item span,.nav-label{display:none}
  .nav-item{justify-content:center}
  .main{margin-left:64px}
  .content,.topbar{padding-left:18px;padding-right:18px}
  #dashRent .tbl-wrap{font-size:12px}
}
</style>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   SISTEMA AyP v3 — Supabase backend + Realtime
   ============================================================ */

const SUPA_URL  = "https://xfmatolvijmnvtrtidwu.supabase.co";
const SUPA_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbWF0b2x2aWptbnZ0cnRpZHd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTIyODEsImV4cCI6MjA5NTU4ODI4MX0.ailruytswxcqPJVHUhYYETLhWdpbbp1ZEOfyZb9SY7U";

/* ---------- Supabase SDK ---------- */
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

async function sbGet(table, opts){
  let q = supa.from(table).select('*');
  if(opts && opts.order) q = q.order(opts.order, {ascending: opts.asc !== false});
  const {data, error} = await q;
  if(error) throw new Error(error.message);
  return data;
}
async function sbInsert(table, body){
  const {data, error} = await supa.from(table).insert(Array.isArray(body)?body:[body]).select();
  if(error) throw new Error(error.message);
  return data;
}
async function sbUpdate(table, id, body){
  const {data, error} = await supa.from(table).update(body).eq('id', id).select();
  if(error) throw new Error(error.message);
  return data;
}
async function sbDelete(table, id){
  const {error} = await supa.from(table).delete().eq('id', id);
  if(error) throw new Error(error.message);
}

/* ---------- Utilidades ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmt(n){ return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:2}).format(n||0); }
function fmtInt(n){ return new Intl.NumberFormat('es-MX').format(n||0); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysAgoISO(d){ const t=new Date(); t.setDate(t.getDate()-d); return t.toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.slice(0,10).split('-'); return `${d}/${m}/${y}`; }
function icons(){
  if(!window.__lucideFailed && window.lucide) lucide.createIcons();
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function setLoading(msg){ document.getElementById('loadingMsg').textContent = msg||'Cargando…'; }
function showErr(msg){ const b=document.getElementById('errBanner'); b.querySelector('#errMsg').textContent=msg; b.classList.add('show'); }
function hideErr(){ document.getElementById('errBanner').classList.remove('show'); }
function setSyncStatus(s){ // 'ok'|'syncing'|'error'
  const dot=document.getElementById('syncDot'), lbl=document.getElementById('syncLabel');
  if(s==='ok'){ dot.className='sync-dot'; lbl.textContent='Conectado'; }
  else if(s==='syncing'){ dot.className='sync-dot offline'; lbl.textContent='Sincronizando…'; }
  else{ dot.className='sync-dot error'; lbl.textContent='Sin conexión'; }
}

/* ---------- Estado en memoria ---------- */
let DB = { productos:[], entidades:[], ventas:[], compras:[], cuentas:[], abonos:[] };

/* ---------- Carga inicial (paralela) ---------- */
async function loadAll(){
  const [productos, entidades, ventas, vlineas, compras, clineas, cuentas, abonos] = await Promise.all([
    sbGet('ayp_productos',   {order:'nombre',  asc:true}),
    sbGet('ayp_entidades',   {order:'nombre',  asc:true}),
    sbGet('ayp_ventas',      {order:'fecha',   asc:false}),
    sbGet('ayp_venta_lineas',{order:'venta_id',asc:true}),
    sbGet('ayp_compras',     {order:'fecha',   asc:false}),
    sbGet('ayp_compra_lineas',{order:'compra_id',asc:true}),
    sbGet('ayp_cuentas',     {order:'fecha_origen',asc:false}),
    sbGet('ayp_abonos',      {order:'fecha',   asc:true}),
  ]);

  DB.productos = productos.map(p=>({
    id:p.id, nombre:p.nombre, categoria:p.categoria,
    precioCostoRef:+p.precio_costo_ref, activo:p.activo
  }));
  DB.entidades = entidades.map(e=>({
    id:e.id, nombre:e.nombre, tipo:e.tipo, telefono:e.telefono, notas:e.notas
  }));
  DB.ventas = ventas.map(v=>({
    id:v.id, entidadId:v.entidad_id, fecha:v.fecha, condicion:v.condicion,
    anticipo:+v.anticipo, total:+v.total, cancelado:v.cancelado,
    lineas: vlineas.filter(l=>l.venta_id===v.id).map(l=>({
      id:l.id, productoId:l.producto_id, cantidad:+l.cantidad, precioUnit:+l.precio_unit, subtotal:+l.subtotal
    }))
  }));
  DB.compras = compras.map(c=>({
    id:c.id, entidadId:c.entidad_id, fecha:c.fecha, condicion:c.condicion,
    anticipo:+c.anticipo, envio:+c.envio, seguro:+c.seguro, total:+c.total, cancelado:c.cancelado,
    lineas: clineas.filter(l=>l.compra_id===c.id).map(l=>({
      id:l.id, productoId:l.producto_id, cantidad:+l.cantidad, precioUnit:+l.precio_unit, subtotal:+l.subtotal
    }))
  }));
  DB.cuentas = cuentas.map(ct=>({
    id:ct.id, tipo:ct.tipo, refId:ct.ref_id, entidadId:ct.entidad_id,
    fechaOrigen:ct.fecha_origen, montoTotal:+ct.monto_total,
    abonos: abonos.filter(a=>a.cuenta_id===ct.id).map(a=>({
      id:a.id, cuentaId:a.cuenta_id, monto:+a.monto, fecha:a.fecha, nota:a.nota
    }))
  }));
}

/* ---------- Realtime (SDK oficial) — canal único con debounce ---------- */
function initRealtime(){
  const tablas = ['ayp_productos','ayp_entidades','ayp_ventas','ayp_venta_lineas',
                  'ayp_compras','ayp_compra_lineas','ayp_cuentas','ayp_abonos'];
  let reloadTimer = null;
  let rendering = false;
  function scheduleReload(){
    // Debounce 400ms — un solo reload aunque lleguen N eventos juntos
    clearTimeout(reloadTimer);
    reloadTimer = setTimeout(async ()=>{
      if(rendering) return;
      rendering = true;
      setSyncStatus('syncing');
      try{
        await loadAll();
        render();
        // icons() ya se llama dentro de render(); no duplicar aquí
        setSyncStatus('ok');
      }catch(e){ setSyncStatus('error'); }
      finally{ rendering = false; }
    }, 400);
  }
  // Un solo canal que escucha todas las tablas ayp_*
  const ch = supa.channel('ayp-all-changes');
  tablas.forEach(tabla=>{
    ch.on('postgres_changes', {event:'*', schema:'public', table:tabla}, scheduleReload);
  });
  ch.subscribe(status=>{
    if(status==='SUBSCRIBED') setSyncStatus('ok');
    if(status==='CHANNEL_ERROR') setSyncStatus('error');
  });
}

/* ---------- Seed demo (solo si tablas vacías) ---------- */
async function seedIfEmpty(){
  if(DB.productos.length > 0) return; // ya tiene datos
  setLoading('Cargando datos de ejemplo…');
  const prods = [
    {id:uid(),nombre:'Geek 50',categoria:'vapes',precio_costo_ref:80,activo:true},
    {id:uid(),nombre:'Geek 25',categoria:'vapes',precio_costo_ref:70,activo:true},
    {id:uid(),nombre:'Geek 15',categoria:'vapes',precio_costo_ref:60,activo:true},
    {id:uid(),nombre:'Waka 36',categoria:'vapes',precio_costo_ref:90,activo:true},
    {id:uid(),nombre:'Miel Carlota 500g',categoria:'mieles',precio_costo_ref:45,activo:true},

/* ---------- Cálculos derivados ---------- */
function ventasActivas(){ return DB.ventas.filter(v=>!v.cancelado); }
function comprasActivas(){ return DB.compras.filter(c=>!c.cancelado); }
function getStock(pid){
  let s=0;
  comprasActivas().forEach(c=>c.lineas.forEach(l=>{ if(l.productoId===pid) s+=l.cantidad; }));
  ventasActivas().forEach(v=>v.lineas.forEach(l=>{ if(l.productoId===pid) s-=l.cantidad; }));
  return s;
}
function prod(id){ return DB.productos.find(p=>p.id===id); }
function ent(id){ return DB.entidades.find(e=>e.id===id); }
function entName(id){ const e=ent(id); return e?e.nombre:'—'; }
function prodName(id){ const p=prod(id); return p?p.nombre:'—'; }
function compraFlete(c){ return (c.envio||0)+(c.seguro||0); }
function compraPiezas(c){ return c.lineas.reduce((a,l)=>a+(l.cantidad||0),0); }
function compraFleteUnit(c){ const pz=compraPiezas(c); return pz>0?compraFlete(c)/pz:0; }
function compraMercancia(c){ return c.lineas.reduce((a,l)=>a+l.subtotal,0); }
function compraTotal(c){ return compraMercancia(c)+compraFlete(c); }
function costoUnitReal(pid){
  let q=0,val=0;
  comprasActivas().forEach(c=>{
    const fu=compraFleteUnit(c);
    c.lineas.forEach(l=>{ if(l.productoId===pid){ q+=l.cantidad; val+=l.cantidad*((l.precioUnit||0)+fu); } });
  });
  if(q>0) return val/q;
  const p=prod(pid); return p?p.precioCostoRef:0;
}
function valorInventario(){ return DB.productos.reduce((a,p)=>a+Math.max(0,getStock(p.id))*costoUnitReal(p.id),0); }
function costoVentaReal(v){ return v.lineas.reduce((a,l)=>a+l.cantidad*costoUnitReal(l.productoId),0); }
function cuentaPagado(c){ return c.abonos.reduce((a,b)=>a+b.monto,0); }
function cuentaSaldo(c){ return Math.max(0,c.montoTotal-cuentaPagado(c)); }
function cuentaEstado(c){ const p=cuentaPagado(c); if(p>=c.montoTotal-0.001) return 'pagado'; if(p>0) return 'parcial'; return 'pendiente'; }
function getMovimientos(){
  const movs=[];
  ventasActivas().forEach(v=>{
    if(v.condicion==='contado') movs.push({fecha:v.fecha,tipo:'venta',desc:`Venta contado · ${entName(v.entidadId)}`,monto:v.total,signo:1,key:'v-'+v.id});
  });
  comprasActivas().forEach(c=>{
    if(c.condicion==='contado') movs.push({fecha:c.fecha,tipo:'compra',desc:`Compra contado · ${entName(c.entidadId)}${compraFlete(c)>0?' (incl. flete)':''}`,monto:compraTotal(c),signo:-1,key:'c-'+c.id});
  });
  DB.cuentas.forEach(ct=>{
    const refCanc = ct.tipo==='cxc' ? DB.ventas.find(v=>v.id===ct.refId)?.cancelado : DB.compras.find(c=>c.id===ct.refId)?.cancelado;
    if(refCanc) return;
    ct.abonos.forEach(ab=>{
      const signo = ct.tipo==='cxc'?1:-1;
      const tipo  = ct.tipo==='cxc'?'abono cobrado':'abono pagado';
      movs.push({fecha:ab.fecha,tipo,desc:`${tipo.charAt(0).toUpperCase()+tipo.slice(1)} · ${entName(ct.entidadId)}${ab.nota?' ('+ab.nota+')':''}`,monto:ab.monto,signo,key:'ab-'+ab.id});
    });
  });
  movs.sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:0);
  let acc=0; movs.forEach(m=>{ acc+=m.signo*m.monto; m.saldoAcc=acc; });
  return movs;
}
function inPeriod(iso,p){
  if(p==='todo') return true;
  const d=new Date(iso+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  if(p==='hoy') return iso===todayISO();
  if(p==='semana'){ const s=new Date(now); s.setDate(s.getDate()-6); return d>=s; }
  if(p==='mes') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  return true;
}

let dashPeriod='mes', dashChart=null;
function renderRankList(items,colorClass,valueFn){
  if(!items.length) return '<div class="empty" style="padding:24px 20px"><p>Sin datos en el período</p></div>';
  const max=valueFn(items[0]);
  return items.map((it,i)=>{
    const v=valueFn(it), pct=max>0?(v/max*100):0;
    return `<div class="rank-item"><div class="rank-header"><span class="name">${i+1}. ${esc(it.nombre)}</span><span class="val">${it.sub||''} ${fmt(v)}</span></div><div class="rank-bar-track"><div class="rank-bar-fill ${colorClass}" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

    return a+ct.abonos.filter(ab=>inPeriod(ab.fecha,dashPeriod)).reduce((s,ab)=>s+ab.monto,0);
  },0);
  const totalCobrado=cobradoContado+cobradoAbonos;
  let costoVentas=0; ventasP.forEach(v=>{ costoVentas+=costoVentaReal(v); });
  const utilidad=totalFacturado-costoVentas;
  const margen=totalFacturado>0?(utilidad/totalFacturado*100):0;
  const egresadoContado=comprasP.filter(c=>c.condicion==='contado').reduce((a,c)=>a+compraTotal(c),0);
  const egresadoAbonos=DB.cuentas.filter(ct=>ct.tipo==='cxp').reduce((a,ct)=>{

  const topProds=Object.entries(volProd).map(([id,d])=>({id,nombre:prodName(id),q:d.q,monto:d.monto,sub:`${fmtInt(d.q)} pz ·`})).sort((a,b)=>b.monto-a.monto).slice(0,5);
  const volClientes={};
  ventasP.forEach(v=>{ volClientes[v.entidadId]=(volClientes[v.entidadId]||0)+v.total; });
  const topClientes=Object.entries(volClientes).map(([id,monto])=>({id,nombre:entName(id),monto})).sort((a,b)=>b.monto-a.monto).slice(0,5);
  const volProvs={};
  comprasP.forEach(c=>{ volProvs[c.entidadId]=(volProvs[c.entidadId]||0)+compraTotal(c); });
  const topProvs=Object.entries(volProvs).map(([id,monto])=>({id,nombre:entName(id),monto})).sort((a,b)=>b.monto-a.monto).slice(0,5);

  c.innerHTML=`
    <div class="kpi-grid">

      <div class="kpi"><div class="lbl"><i data-lucide="circle-dollar-sign"></i>Entradas</div><div class="val green">${fmt(totalCobrado)}</div><div class="sub">Contado + abonos recibidos</div></div>
      <div class="kpi"><div class="lbl"><i data-lucide="badge-dollar-sign"></i>Utilidad bruta</div><div class="val ${utilidad>=0?'green':'red'}">${fmt(utilidad)}</div><div class="sub">Margen ${margen.toFixed(1)}% · sobre facturado</div></div>
      <div class="kpi"><div class="lbl"><i data-lucide="arrow-down-circle"></i>Salidas</div><div class="val red">${fmt(totalEgresado)}</div><div class="sub">Contado + abonos pagados</div></div>
      <div class="kpi"><div class="lbl"><i data-lucide="wallet"></i>Flujo neto de caja</div><div class="val ${flujoNeto>=0?'green':'red'}">${fmt(flujoNeto)}</div><div class="sub">Entradas − Salidas en período</div></div>
      <div class="kpi"><div class="lbl"><i data-lucide="boxes"></i>Valor de inventario</div><div class="val">${fmt(valInv)}</div><div class="sub">${fmtInt(piezasStock)} pz · landed cost prom.</div></div>
      <div class="kpi"><div class="lbl"><i data-lucide="hand-coins"></i>CxC pendiente</div><div class="val amber">${fmt(cxc)}</div><div class="sub">Por cobrar (total acumulado)</div></div>
      <div class="kpi"><div class="lbl"><i data-lucide="receipt"></i>CxP pendiente</div><div class="val red">${fmt(cxp)}</div><div class="sub">Por pagar (total acumulado)</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px" id="dashCols">
      <div class="card"><div class="card-head"><h3>Ventas vs. Compras</h3><span class="badge gray">${dashPeriod}</span></div><div class="card-pad"><div style="height:260px"><canvas id="chart"></canvas></div></div></div>
      <div class="card"><div class="card-head"><h3>Productos más vendidos</h3><span class="badge indigo">por monto</span></div><div class="card-pad">${renderRankList(topProds,'indigo',it=>it.monto)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px" id="dashCols2">
      <div class="card"><div class="card-head"><h3>Top Clientes</h3><span class="badge green">ventas período</span></div><div class="card-pad">${renderRankList(topClientes,'green',it=>it.monto)}</div></div>
      <div class="card"><div class="card-head"><h3>Top Proveedores</h3><span class="badge amber">compras período</span></div><div class="card-pad">${renderRankList(topProvs,'amber',it=>it.monto)}</div></div>
    </div>
    <div class="card" id="dashRent">
      <div class="card-head"><h3>Rentabilidad por producto</h3><span class="badge gray">${dashPeriod} · ventas activas</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Producto</th><th>Cat.</th>
          <th class="num">Piezas vend.</th>
          <th class="num">Ingresos</th>
          <th class="num">Costo real</th>
          <th class="num">Utilidad</th>
          <th class="num">Margen %</th>
          <th class="num">Stock actual</th>
        </tr></thead>
        <tbody>${(()=>{
          // Build per-product stats from ventasP
          const byProd={};
          ventasP.forEach(v=>v.lineas.forEach(l=>{
            if(!byProd[l.productoId]) byProd[l.productoId]={pz:0,ing:0,costo:0};
            byProd[l.productoId].pz+=l.cantidad;
            byProd[l.productoId].ing+=l.subtotal;
            byProd[l.productoId].costo+=l.cantidad*costoUnitReal(l.productoId);
          }));
          const rows=Object.entries(byProd).map(([pid,d])=>{
            const p=prod(pid); if(!p) return null;
            const util=d.ing-d.costo;
            const mg=d.ing>0?(util/d.ing*100):0;
            const stk=getStock(pid);
            const mgColor=mg>=30?'var(--green)':mg>=10?'var(--amber)':'var(--red)';
            return {pid,nombre:p.nombre,cat:p.categoria,pz:d.pz,ing:d.ing,costo:d.costo,util,mg,stk,mgColor};
          }).filter(Boolean).sort((a,b)=>b.util-a.util);
          if(!rows.length) return `<tr><td colspan="8"><div class="empty" style="padding:32px 20px"><i data-lucide="bar-chart-2"></i><p>Sin ventas en el período</p></div></td></tr>`;

        })()}</tbody>

  document.querySelectorAll('#periodSeg button').forEach(b=>b.onclick=()=>{ dashPeriod=b.dataset.p; renderDashboard(c); icons(); });

function drawChart(ventasP, comprasP){
  if(window.__chartFailed||!window.Chart){ const cv=document.getElementById('chart'); if(cv) cv.parentElement.innerHTML='<div class="empty"><p>Gráfica no disponible</p></div>'; return; }
  const byMonth=dashPeriod==='todo';
  const buckets={};
  ventasP.forEach(v=>{
    const k=byMonth?v.fecha.slice(0,7):v.fecha;
    if(!buckets[k]) buckets[k]={vend:0,cost:0,util:0,comp:0};
    buckets[k].vend+=v.total;
    const cv=costoVentaReal(v); buckets[k].cost+=cv; buckets[k].util+=(v.total-cv);
  });
  comprasP.forEach(c=>{
    const k=byMonth?c.fecha.slice(0,7):c.fecha;
    if(!buckets[k]) buckets[k]={vend:0,cost:0,util:0,comp:0};
    buckets[k].comp+=compraTotal(c);
  });
  const keys=Object.keys(buckets).sort();
  const ctx=document.getElementById('chart'); if(!ctx) return;
  if(dashChart){ dashChart.destroy(); dashChart=null; }
  if(!keys.length){ ctx.parentElement.innerHTML='<div class="empty"><p>Sin datos para graficar</p></div>'; return; }
  const labels=keys.map(k=>byMonth?k:k.slice(8)+'/'+k.slice(5,7));
  dashChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Ventas',data:keys.map(k=>buckets[k].vend),backgroundColor:'#6366f1',borderRadius:5,maxBarThickness:30,order:2},
        {label:'Compras',data:keys.map(k=>buckets[k].comp),backgroundColor:'#f59e0b',borderRadius:5,maxBarThickness:30,order:3},
        {label:'Utilidad',data:keys.map(k=>buckets[k].util),type:'line',borderColor:'#16a34a',backgroundColor:'#16a34a22',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#16a34a',tension:0.3,fill:false,order:1},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8,font:{family:'Inter',size:12}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Inter',size:11}}},
        y:{beginAtZero:true,ticks:{font:{family:'Inter',size:11},callback:v=>v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v},grid:{color:'#f0f0f0'}}
      }
    }
  });
}

    </select></div>

  `,async()=>{
    const nombre=document.getElementById('p_nombre').value.trim();
    const cat=document.getElementById('p_cat').value;

      if(p){ await sbUpdate('ayp_productos',p.id,{nombre,categoria:cat,precio_costo_ref:costo}); }

    }catch(e){ showErr('Error al guardar: '+e.message); }
    setSyncStatus('ok');

    if(histFiltro==='cancelados'&&!r.cancelado) return false;

  const isV=histTab==='ventas';

    <div class="tabs">
      <button class="tab ${histTab==='ventas'?'active':''}" data-ht="ventas">Ventas</button>

      <thead><tr><th>Fecha</th><th>${isV?'Cliente':'Proveedor'}</th><th>Condición</th>${!isV?'<th class="num">Flete</th>':''}<th class="num">Total</th>${isV?'<th class="num">Costo real</th><th class="num">Utilidad</th>':''}<th>Estado</th><th></th></tr></thead>
      <tbody>${filtrados.length?filtrados.map(r=>{

          ${!isV?`<td class="num muted">${compraFlete(r)>0?fmt(compraFlete(r)):'—'}</td>`:''}
          <td class="num" style="font-weight:700">${fmt(total)}</td>
          ${isV?`<td class="num muted">${fmt(costoR)}</td><td class="num" style="font-weight:600;color:${util>=0?'var(--green)':'var(--red)'}">${fmt(util)}</td>`:''}
          <td>${r.cancelado?'<span class="badge red"><span class="dot"></span>Cancelado</span>':'<span class="badge green"><span class="dot"></span>Activo</span>'}</td>
          <td><div class="row-actions">
            <button class="btn-icon" onclick="verDetalle('${r.id}','${histTab}')"><i data-lucide="eye"></i></button>

function cancelarTrans(id,tipo){
  const r=tipo==='ventas'?DB.ventas.find(v=>v.id===id):DB.compras.find(c=>c.id===id);
  if(!r||r.cancelado) return;
  const isV=tipo==='ventas';
  const cuenta=DB.cuentas.find(ct=>ct.refId===id);
  openModal('Cancelar '+(isV?'venta':'compra'),`
    <div style="background:var(--red-soft);border:1px solid #fca5a5;border-radius:8px;padding:11px 13px;margin-bottom:14px;font-size:12.5px;color:#991b1b">
      <strong>Atención:</strong> revertirá el impacto en inventario y movimientos.
      ${cuenta&&cuenta.abonos.length?'<br><br>Esta transacción tiene abonos registrados.':''}
    </div>
    <p>¿Cancelar la ${isV?'venta':'compra'} de <strong>${esc(entName(r.entidadId))}</strong> del ${fmtDate(r.fecha)}?</p>
  `,async()=>{
    try{
      await sbUpdate(isV?'ayp_ventas':'ayp_compras',id,{cancelado:true});

      toast((isV?'Venta':'Compra')+' cancelada','x-circle'); icons();

  },'Cancelar operación');
  setTimeout(()=>{ const ok=document.getElementById('mOk'); if(ok){ ok.classList.remove('btn-primary'); ok.classList.add('btn-danger'); } },10);

function restaurarTrans(id,tipo){
  const r=tipo==='ventas'?DB.ventas.find(v=>v.id===id):DB.compras.find(c=>c.id===id);
  if(!r||!r.cancelado) return;
  const isV=tipo==='ventas';
  if(isV){
    const need={};
    r.lineas.forEach(l=>need[l.productoId]=(need[l.productoId]||0)+l.cantidad);
    for(const pid in need){ if(need[pid]>getStock(pid)){ toast(`Stock insuficiente de ${prodName(pid)}`,'alert-triangle'); return; } }
  }
  openModal('Restaurar '+(isV?'venta':'compra'),`<p>¿Restaurar y volver a impactar inventario y movimientos?</p>`,async()=>{
    try{
      await sbUpdate(isV?'ayp_ventas':'ayp_compras',id,{cancelado:false});
      await loadAll(); closeModal(); renderHistorial(document.getElementById('content'));
      toast((isV?'Venta':'Compra')+' restaurada','rotate-ccw'); icons();
    }catch(e){ showErr('Error: '+e.message); }
  },'Restaurar');
}

async function submitTrans(kind){
  const isV=kind==='venta', isE=!!formEditingId;
  const entidadId=document.getElementById('f_ent').value;
  const fecha=document.getElementById('f_fecha').value||todayISO();
  const cond=document.getElementById('f_cond').value;
  const anticipo=cond==='credito'?(parseFloat(document.getElementById('f_anticipo').value)||0):0;
  if(!entidadId){ toast('Selecciona '+(isV?'cliente':'proveedor'),'alert-circle'); return; }
  const lineas=formLineas.filter(l=>l.productoId&&l.cantidad>0).map(l=>({
    productoId:l.productoId, cantidad:l.cantidad, precioUnit:l.precioUnit, subtotal:l.cantidad*l.precioUnit
  }));
  if(!lineas.length){ toast('Agrega al menos una línea válida','alert-circle'); return; }
  const mercancia=lineas.reduce((a,l)=>a+l.subtotal,0);
  const envio=isV?0:(formEnvio||0), seguro=isV?0:(formSeguro||0);
  const totalFinal=mercancia+envio+seguro;

  setSyncStatus('syncing');
  try{
    if(isE){
      const old=isV?DB.ventas.find(v=>v.id===formEditingId):DB.compras.find(c=>c.id===formEditingId);
      if(isV){
        const need={};
        lineas.forEach(l=>need[l.productoId]=(need[l.productoId]||0)+l.cantidad);
        for(const pid in need){
          const stockSinEsta=getStock(pid)+(old.lineas.find(l=>l.productoId===pid)?.cantidad||0);
          if(need[pid]>stockSinEsta){ toast(`Stock insuficiente de ${prodName(pid)}`,'alert-triangle'); setSyncStatus('ok'); return; }
        }
      }
      // Update header
      await sbUpdate(isV?'ayp_ventas':'ayp_compras', formEditingId, {
        entidad_id:entidadId, fecha, total:mercancia,
        ...(isV?{}:{envio,seguro})
      });
      // Delete old lines and re-insert
      const lineTable=isV?'ayp_venta_lineas':'ayp_compra_lineas';
      const lineFK=isV?'venta_id':'compra_id';
      const {error:delErr} = await supa.from(lineTable).delete().eq(lineFK, formEditingId);
      if(delErr) throw new Error(delErr.message);
      await sbInsert(lineTable, lineas.map(l=>({id:uid(),[lineFK]:formEditingId,producto_id:l.productoId,cantidad:l.cantidad,precio_unit:l.precioUnit,subtotal:l.subtotal})));
      // Update cuenta
      const cta=DB.cuentas.find(ct=>ct.refId===formEditingId);
      if(cta) await sbUpdate('ayp_cuentas',cta.id,{monto_total:totalFinal,entidad_id:entidadId});
      await loadAll(); resetForm(); toast((isV?'Venta':'Compra')+' actualizada','check-circle'); navigate('dashboard');
    } else {
      if(isV){
        const need={};
        lineas.forEach(l=>need[l.productoId]=(need[l.productoId]||0)+l.cantidad);
        for(const pid in need){
          if(need[pid]>getStock(pid)){ toast(`Stock insuficiente de ${prodName(pid)} (disp. ${fmtInt(getStock(pid))})`,'alert-triangle'); setSyncStatus('ok'); return; }
        }
      }
      if(anticipo>totalFinal){ toast('El anticipo no puede superar el total','alert-circle'); setSyncStatus('ok'); return; }
      const recId=uid();
      if(isV){
        await sbInsert('ayp_ventas',[{id:recId,entidad_id:entidadId,fecha,condicion:cond,anticipo,total:mercancia,cancelado:false}]);
        await sbInsert('ayp_venta_lineas',lineas.map(l=>({id:uid(),venta_id:recId,producto_id:l.productoId,cantidad:l.cantidad,precio_unit:l.precioUnit,subtotal:l.subtotal})));
      } else {
        await sbInsert('ayp_compras',[{id:recId,entidad_id:entidadId,fecha,condicion:cond,anticipo,envio,seguro,total:mercancia,cancelado:false}]);
        await sbInsert('ayp_compra_lineas',lineas.map(l=>({id:uid(),compra_id:recId,producto_id:l.productoId,cantidad:l.cantidad,precio_unit:l.precioUnit,subtotal:l.subtotal})));
      }
      if(cond==='credito'){
        const ctaId=uid();
        await sbInsert('ayp_cuentas',[{id:ctaId,tipo:isV?'cxc':'cxp',ref_id:recId,entidad_id:entidadId,fecha_origen:fecha,monto_total:totalFinal}]);
        if(anticipo>0) await sbInsert('ayp_abonos',[{id:uid(),cuenta_id:ctaId,monto:anticipo,fecha,nota:'Anticipo'}]);
      }
      await loadAll(); resetForm();
      toast((isV?'Venta':'Compra')+' registrada · '+fmt(totalFinal),'check-circle');
      navigate('dashboard');
    }
  }catch(e){ showErr('Error al guardar: '+e.message); }
  setSyncStatus('ok');
}

/* =========================================================
   PAGOS
   ========================================================= */
let pagosTab='cxc', pagosFilter='todos', expandedCuenta=null;
function renderPagos(c){
  setTop('Gestión de Pagos','Cuentas por cobrar y por pagar','');
  const tipo=pagosTab;
  let cuentas=DB.cuentas.filter(c=>c.tipo===tipo);
  if(pagosFilter!=='todos') cuentas=cuentas.filter(c=>cuentaEstado(c)===pagosFilter);
  cuentas.sort((a,b)=>a.fechaOrigen<b.fechaOrigen?1:-1);
  const totalPend=DB.cuentas.filter(c=>c.tipo===tipo).reduce((a,c)=>a+cuentaSaldo(c),0);
  c.innerHTML=`
    <div class="tabs">
      <button class="tab ${tipo==='cxc'?'active':''}" data-tab="cxc">Cuentas por Cobrar</button>
      <button class="tab ${tipo==='cxp'?'active':''}" data-tab="cxp">Cuentas por Pagar</button>
    </div>
    <div class="filters">
      <div class="seg" id="pf">${[['todos','Todos'],['pendiente','Pendientes'],['parcial','Parciales'],['pagado','Pagados']].map(f=>`<button data-f="${f[0]}" class="${pagosFilter===f[0]?'active':''}">${f[1]}</button>`).join('')}</div>
      <div style="margin-left:auto;font-size:13px;color:var(--text-soft)">Saldo ${tipo==='cxc'?'por cobrar':'por pagar'}: <strong style="color:${tipo==='cxc'?'var(--amber)':'var(--red)'}">${fmt(totalPend)}</strong></div>
    </div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr><th></th><th>${tipo==='cxc'?'Cliente':'Proveedor'}</th><th>Origen</th><th class="num">Total</th><th class="num">Pagado</th><th class="num">Saldo</th><th>Estado</th><th></th></tr></thead>
      <tbody>${cuentas.length?cuentas.map(ct=>{
        const pag=cuentaPagado(ct),sal=cuentaSaldo(ct),est=cuentaEstado(ct);
        const badge=est==='pagado'?'<span class="badge green"><span class="dot"></span>Pagado</span>':est==='parcial'?'<span class="badge amber"><span class="dot"></span>Parcial</span>':'<span class="badge red"><span class="dot"></span>Pendiente</span>';
        const open=expandedCuenta===ct.id;
        const refCanc=ct.tipo==='cxc'?DB.ventas.find(v=>v.id===ct.refId)?.cancelado:DB.compras.find(c=>c.id===ct.refId)?.cancelado;
        const rowMain=`<tr style="${refCanc?'opacity:.5':''}">
          <td><button class="expand-btn ${open?'open':''}" onclick="toggleExpand('${ct.id}')"><i data-lucide="chevron-right"></i></button></td>
          <td style="font-weight:600">${esc(entName(ct.entidadId))}${refCanc?' <span class="badge gray" style="font-size:10px">cancelada</span>':''}</td>
          <td class="muted">${fmtDate(ct.fechaOrigen)}</td>
          <td class="num">${fmt(ct.montoTotal)}</td>
          <td class="num">${fmt(pag)}</td>
          <td class="num" style="font-weight:600">${fmt(sal)}</td>
          <td>${badge}</td>
          <td><div class="row-actions">${est!=='pagado'&&!refCanc?`<button class="btn btn-ghost btn-sm" onclick="openAbono('${ct.id}')"><i data-lucide="plus"></i>Abonar</button>`:'<span class="muted" style="font-size:12px">'+(refCanc?'Cancelada':'Liquidada')+'</span>'}</div></td>
        </tr>`;
        const rowExp=open?`<tr class="abonos-row"><td colspan="8"><div class="abonos-inner">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-mut);font-weight:600;margin-bottom:6px">Historial de abonos</div>
          ${ct.abonos.length?ct.abonos.slice().sort((a,b)=>a.fecha<b.fecha?-1:1).map(ab=>`<div class="abono-line"><span>${fmtDate(ab.fecha)} · ${esc(ab.nota||'Abono')}</span><span style="font-weight:600;color:var(--text)">${fmt(ab.monto)}</span></div>`).join(''):'<div class="muted" style="font-size:12.5px;padding:4px 0">Sin abonos registrados</div>'}
        </div></td></tr>`:'';
        return rowMain+rowExp;
      }).join(''):`<tr><td colspan="8"><div class="empty"><i data-lucide="wallet"></i><p>Sin cuentas</p></div></td></tr>`}
      </tbody></table></div></div>`;
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ pagosTab=b.dataset.tab; expandedCuenta=null; renderPagos(c); icons(); });
  document.querySelectorAll('#pf button').forEach(b=>b.onclick=()=>{ pagosFilter=b.dataset.f; renderPagos(c); icons(); });
  icons();
}
function toggleExpand(id){ expandedCuenta=expandedCuenta===id?null:id; renderPagos(document.getElementById('content')); icons(); }
function openAbono(cuentaId){
  const ct=DB.cuentas.find(c=>c.id===cuentaId);
  const sal=cuentaSaldo(ct);
  openModal('Registrar abono',`
    <p style="font-size:13px;color:var(--text-soft);margin-bottom:14px">${ct.tipo==='cxc'?'Cliente':'Proveedor'}: <strong>${esc(entName(ct.entidadId))}</strong> · Saldo: <strong>${fmt(sal)}</strong></p>
    <div class="field"><label>Monto</label><input class="input" type="number" min="0" step="0.01" id="ab_monto" value="${sal.toFixed(2)}"></div>
    <div class="field"><label>Fecha</label><input class="input" type="date" id="ab_fecha" value="${todayISO()}"></div>
    <div class="field"><label>Nota (opcional)</label><input class="input" id="ab_nota" placeholder="Transferencia, efectivo…"></div>
  `,async()=>{
    const monto=parseFloat(document.getElementById('ab_monto').value)||0;
    const fecha=document.getElementById('ab_fecha').value||todayISO();
    const nota=document.getElementById('ab_nota').value.trim();
    if(monto<=0){ toast('Monto inválido','alert-circle'); return false; }
    if(monto>sal+0.001){ toast('El abono supera el saldo','alert-circle'); return false; }
    setSyncStatus('syncing');
    try{
      await sbInsert('ayp_abonos',[{id:uid(),cuenta_id:cuentaId,monto,fecha,nota}]);
      await loadAll(); closeModal(); renderPagos(document.getElementById('content'));
      toast('Abono registrado · '+fmt(monto),'check-circle'); icons();
    }catch(e){ showErr('Error: '+e.message); }
    setSyncStatus('ok');
  },'Registrar abono');
}

/* =========================================================
   MOVIMIENTOS
   ========================================================= */
let movTipo='todos', movDesde='', movHasta='';
function renderMovimientos(c){
  setTop('Movimientos','Bitácora de entradas y salidas de dinero',`<button class="btn btn-ghost" id="expCsv"><i data-lucide="download"></i>Exportar CSV</button>`);
  let movs=getMovimientos();
  if(movTipo!=='todos') movs=movs.filter(m=>m.tipo===movTipo);
  if(movDesde) movs=movs.filter(m=>m.fecha>=movDesde);
  if(movHasta) movs=movs.filter(m=>m.fecha<=movHasta);
  const ent_=movs.filter(m=>m.signo>0).reduce((a,m)=>a+m.monto,0);
  const sal_=movs.filter(m=>m.signo<0).reduce((a,m)=>a+m.monto,0);
  c.innerHTML=`
    <div class="filters">
      <select class="input" id="m_tipo" style="width:auto">
        <option value="todos">Todos los tipos</option><option value="venta">Ventas</option><option value="compra">Compras</option>
        <option value="abono cobrado">Abonos cobrados</option><option value="abono pagado">Abonos pagados</option>
      </select>
      <input class="input" type="date" id="m_desde" value="${movDesde}" style="width:auto">
      <span class="muted">→</span>
      <input class="input" type="date" id="m_hasta" value="${movHasta}" style="width:auto">
      <button class="btn btn-ghost btn-sm" id="m_clear">Limpiar</button>
      <div style="margin-left:auto;display:flex;gap:16px;font-size:13px">
        <span style="color:var(--green)">Entradas: <strong>${fmt(ent_)}</strong></span>
        <span style="color:var(--red)">Salidas: <strong>${fmt(sal_)}</strong></span>
        <span>Neto: <strong>${fmt(ent_-sal_)}</strong></span>
      </div>
    </div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th class="num">Monto</th><th class="num">Saldo acum.</th></tr></thead>
      <tbody>${movs.length?movs.slice().reverse().map(m=>`<tr>
        <td class="muted">${fmtDate(m.fecha)}</td>
        <td><span class="badge ${m.signo>0?'green':'red'}">${m.tipo.charAt(0).toUpperCase()+m.tipo.slice(1)}</span></td>
        <td>${esc(m.desc)}</td>
        <td class="num" style="font-weight:600;color:${m.signo>0?'var(--green)':'var(--red)'}">${m.signo>0?'+':'−'}${fmt(m.monto)}</td>
        <td class="num muted">${fmt(m.saldoAcc)}</td>
      </tr>`).join(''):`<tr><td colspan="5"><div class="empty"><i data-lucide="arrow-left-right"></i><p>Sin movimientos</p></div></td></tr>`}
      </tbody></table></div></div>`;
  document.getElementById('m_tipo').value=movTipo;
  document.getElementById('m_tipo').onchange=e=>{ movTipo=e.target.value; renderMovimientos(c); icons(); };
  document.getElementById('m_desde').onchange=e=>{ movDesde=e.target.value; renderMovimientos(c); icons(); };
  document.getElementById('m_hasta').onchange=e=>{ movHasta=e.target.value; renderMovimientos(c); icons(); };
  document.getElementById('m_clear').onclick=()=>{ movTipo='todos'; movDesde=''; movHasta=''; renderMovimientos(c); icons(); };
  document.getElementById('expCsv').onclick=()=>{
    const rows=[['Fecha','Tipo','Descripcion','Monto','Direccion','Saldo acumulado']];
    movs.forEach(m=>rows.push([m.fecha,m.tipo,m.desc.replace(/"/g,"'"),m.monto.toFixed(2),m.signo>0?'Entrada':'Salida',m.saldoAcc.toFixed(2)]));
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`movimientos_AyP_${todayISO()}.csv`; document.body.appendChild(a); a.click(); a.remove();
    toast('CSV exportado','download');
  };
  icons();
}

/* =========================================================
   ENTIDADES
   ========================================================= */
function renderEntidades(c){
  setTop('Clientes y Proveedores','Catálogo de contactos',`<button class="btn btn-primary" id="newEntBtn"><i data-lucide="user-plus"></i>Nuevo contacto</button>`);
  c.innerHTML=`<div class="card"><div class="tbl-wrap"><table>
    <thead><tr><th>Nombre</th><th>Tipo</th><th>Teléfono</th><th>Notas</th><th></th></tr></thead>
    <tbody>${DB.entidades.length?DB.entidades.map(e=>`<tr>
      <td style="font-weight:600">${esc(e.nombre)}</td>
      <td>${e.tipo==='cliente'?'<span class="badge indigo">Cliente</span>':e.tipo==='proveedor'?'<span class="badge amber">Proveedor</span>':'<span class="badge gray">Ambos</span>'}</td>
      <td class="muted">${esc(e.telefono)||'—'}</td>
      <td class="muted" style="max-width:280px">${esc(e.notas)||'—'}</td>
      <td><div class="row-actions"><button class="btn-icon" onclick="openEntidad('${e.id}')"><i data-lucide="pencil"></i></button></div></td>
    </tr>`).join(''):`<tr><td colspan="5"><div class="empty"><i data-lucide="contact"></i><p>Sin contactos</p></div></td></tr>`}
    </tbody></table></div></div>`;
  document.getElementById('newEntBtn').onclick=()=>openEntidad(); icons();
}
function openEntidad(id,presetTipo){
  const e=id?ent(id):null, tipo=e?e.tipo:(presetTipo||'cliente');
  openModal(e?'Editar contacto':'Nuevo contacto',`
    <div class="field"><label>Nombre</label><input class="input" id="e_nombre" value="${e?esc(e.nombre):''}" placeholder="Nombre o razón social"></div>
    <div class="field"><label>Tipo</label><select class="input" id="e_tipo">
      <option value="cliente" ${tipo==='cliente'?'selected':''}>Cliente</option>
      <option value="proveedor" ${tipo==='proveedor'?'selected':''}>Proveedor</option>
      <option value="ambos" ${tipo==='ambos'?'selected':''}>Ambos</option>
    </select></div>
    <div class="field"><label>Teléfono</label><input class="input" id="e_tel" value="${e?esc(e.telefono):''}"></div>
    <div class="field"><label>Notas</label><textarea class="input" id="e_notas">${e?esc(e.notas):''}</textarea></div>
  `,async()=>{
    const nombre=document.getElementById('e_nombre').value.trim();
    if(!nombre){ toast('Escribe un nombre','alert-circle'); return false; }
    const tipoV=document.getElementById('e_tipo').value;
    const tel=document.getElementById('e_tel').value.trim();
    const notas=document.getElementById('e_notas').value.trim();
    setSyncStatus('syncing');
    try{
      let newId;
      if(e){ await sbUpdate('ayp_entidades',e.id,{nombre,tipo:tipoV,telefono:tel,notas}); newId=e.id; }
      else{ newId=uid(); await sbInsert('ayp_entidades',[{id:newId,nombre,tipo:tipoV,telefono:tel,notas}]); }
      await loadAll(); closeModal(); toast('Contacto guardado','check');
      if(formAfterEntity){ const cb=formAfterEntity; formAfterEntity=null; cb(newId); render(); }
      else render();
    }catch(e){ showErr('Error: '+e.message); }
    setSyncStatus('ok');
  });
}

/* =========================================================
   MODAL & TOAST
   ========================================================= */
let modalConfirm=null;
function openModal(title,bodyHTML,onConfirm,confirmLabel){
  modalConfirm=onConfirm;
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>${title}</h3><button class="btn-icon" id="mClose"><i data-lucide="x"></i></button></div>
    <div class="modal-body">${bodyHTML}</div>
    ${onConfirm!==null?`<div class="modal-foot"><button class="btn btn-ghost" id="mCancel">Cancelar</button><button class="btn btn-primary" id="mOk"><i data-lucide="check"></i>${confirmLabel||'Guardar'}</button></div>`:''}`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('mClose').onclick=closeModal;
  const mc=document.getElementById('mCancel'); if(mc) mc.onclick=closeModal;
  const mo=document.getElementById('mOk'); if(mo) mo.onclick=()=>{ if(modalConfirm) modalConfirm(); };
  icons();
  setTimeout(()=>{ const f=document.querySelector('.modal-body input,.modal-body select,.modal-body textarea'); if(f) f.focus(); },50);
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); modalConfirm=null; formAfterEntity=null; }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
let toastT=null;
function toast(msg,icon){
  const t=document.getElementById('toast');
  t.innerHTML=`<i data-lucide="${icon||'info'}"></i>${esc(msg)}`;
  t.classList.add('show'); icons(); clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2600);
}


/* =========================================================
   NAV — Event delegation (sobrevive re-renders de lucide)
   ========================================================= */
// El script es defer-equivalent (al final del body), sidebar ya existe
document.querySelector('.sidebar').addEventListener('click', e=>{
  const btn = e.target.closest('[data-view]');
  if(btn && btn.dataset.view) navigate(btn.dataset.view);
});

/* =========================================================
   INIT
   ========================================================= */
async function init(){
  try{
    await loadAll();
    await seedIfEmpty();
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('appShell').style.display='flex';
    renderNav(); render(); icons();
    initRealtime();
    initVisibilityReload();
    setSyncStatus('ok');
  }catch(err){
    document.getElementById('loadingMsg').textContent='Error al conectar con Supabase: '+err.message;
    document.querySelector('.loading-screen .spinner').style.display='none';
  }
}

/* =========================================================
   RELOAD AL VOLVER A LA PESTAÑA
   ========================================================= */
function initVisibilityReload(){
  let lastHidden = null;

  // Se dispara cuando el usuario vuelve a esta pestaña
  document.addEventListener('visibilitychange', async ()=>{
    if(document.visibilityState === 'visible'){
      // Solo recarga si estuvo oculta más de 3 segundos
      const away = lastHidden ? Date.now() - lastHidden : 0;
      if(away < 3000) return;
      setSyncStatus('syncing');
      try{
        await loadAll();
        render();
        setSyncStatus('ok');
      }catch(e){ setSyncStatus('error'); }
    } else {
      lastHidden = Date.now();
    }
  });

  // Fallback: también en focus de la ventana (Safari/Firefox)
  window.addEventListener('focus', async ()=>{
    if(document.visibilityState !== 'visible') return;
    const away = lastHidden ? Date.now() - lastHidden : 0;
    if(away < 3000) return;
    setSyncStatus('syncing');
    try{
      await loadAll();
      render();
      setSyncStatus('ok');
    }catch(e){ setSyncStatus('error'); }
  });
}

let tries=0;
(function boot(){
  const lReady=window.lucide||window.__lucideFailed;
  const cReady=window.Chart||window.__chartFailed;
  if((lReady&&cReady)||tries>25){ init(); }
  else{ tries++; setTimeout(boot,80); }
})();
</script>
